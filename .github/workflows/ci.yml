name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    runs-on:
      - codebuild-case-178312259400188-runner-${{ github.run_id }}-${{ github.run_attempt }}
      - buildspec-override:true
    steps:
      - name: Timestamp - start
        run: date -u "+%Y-%m-%dT%H:%M:%S.%3NZ"

      - uses: actions/checkout@v4

      - name: Run CI checks
        run: |
          date -u "+%Y-%m-%dT%H:%M:%S.%3NZ"
          echo "=== CI Start ==="
          echo "Branch: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"
          echo "=== CI checks passed ==="

      - name: Simulated failure (exit 1)
        run: |
          date -u "+%Y-%m-%dT%H:%M:%S.%3NZ"
          echo "=== Simulating step failure ==="
          exit 1

      - name: Write run metadata (always runs)
        if: always()
        run: |
          mkdir -p /tmp/gha-metadata
          echo "${{ github.run_id }}" > /tmp/gha-metadata/run_id
          echo "${{ github.repository }}" > /tmp/gha-metadata/repository
          echo "${{ job.status }}" > /tmp/gha-metadata/job_status
          echo "=== Metadata written ==="
          echo "run_id: ${{ github.run_id }}"
          echo "repository: ${{ github.repository }}"
          echo "job.status: ${{ job.status }}"
