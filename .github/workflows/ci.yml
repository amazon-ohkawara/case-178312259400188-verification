name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    runs-on:
      - codebuild-case-178312259400188-runner-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Timestamp - start
        run: date -u "+%Y-%m-%dT%H:%M:%S.%3NZ"

      - uses: actions/checkout@v4

      - name: Timestamp - after checkout
        run: date -u "+%Y-%m-%dT%H:%M:%S.%3NZ"

      - name: Run CI checks
        run: |
          date -u "+%Y-%m-%dT%H:%M:%S.%3NZ"
          echo "=== CI Start ==="
          echo "Branch: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"
          echo "SHA: ${{ github.sha }}"
          echo "=== CI checks passed ==="

      - name: Timestamp - before failure
        run: date -u "+%Y-%m-%dT%H:%M:%S.%3NZ"

      - name: Simulated failure (exit 1)
        run: |
          date -u "+%Y-%m-%dT%H:%M:%S.%3NZ"
          echo "=== Simulating step failure ==="
          echo "This step will exit with code 1"
          exit 1
